name: Deploy to Coolify

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify deploy — backend
        env:
          WEBHOOK_URL: ${{ vars.COOLIFY_BACKEND_WEBHOOK }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          if [ -n "$WEBHOOK_URL" ]; then
            curl -s -X GET "$WEBHOOK_URL" -H "Authorization: Bearer $COOLIFY_TOKEN"
          fi

      - name: Trigger Coolify deploy — storefront
        env:
          WEBHOOK_URL: ${{ vars.COOLIFY_STOREFRONT_WEBHOOK }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          if [ -n "$WEBHOOK_URL" ]; then
            curl -s -X GET "$WEBHOOK_URL" -H "Authorization: Bearer $COOLIFY_TOKEN"
          fi
